spring:
  datasource:
    url: jdbc:h2:file:./data/scraper;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

logging:
  level:
    root: INFO
    com.scraper: DEBUG
